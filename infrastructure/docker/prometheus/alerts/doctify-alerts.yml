# ===========================================
# Prometheus Alerting Rules for Doctify
# ===========================================

groups:
  # ===========================================
  # Application Alerts
  # ===========================================
  - name: doctify_application
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.service }}"

      # Slow API response time
      - alert: SlowAPIResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "API response time is slow"
          description: "95th percentile response time is {{ $value }}s for {{ $labels.service }}"

      # Service down
      - alert: ServiceDown
        expr: up{job=~"doctify-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} has been down for more than 2 minutes"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name=~"doctify-.*"}
            /
            container_spec_memory_limit_bytes{name=~"doctify-.*"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of memory limit"

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total{name=~"doctify-.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Container {{ $labels.name }} CPU usage is {{ $value | humanizePercentage }}"

  # ===========================================
  # Celery Alerts
  # ===========================================
  - name: doctify_celery
    interval: 30s
    rules:
      # Queue backlog
      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
          service: celery
        annotations:
          summary: "Celery queue backlog"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending tasks"

      # Task failure rate
      - alert: HighTaskFailureRate
        expr: |
          (
            rate(celery_task_failed_total[5m])
            /
            rate(celery_task_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
          service: celery
        annotations:
          summary: "High Celery task failure rate"
          description: "Task failure rate is {{ $value | humanizePercentage }}"

      # Worker down
      - alert: CeleryWorkerDown
        expr: celery_workers_active == 0
        for: 2m
        labels:
          severity: critical
          service: celery
        annotations:
          summary: "No active Celery workers"
          description: "All Celery workers are down"

  # ===========================================
  # Database Alerts
  # ===========================================
  - name: doctify_database
    interval: 30s
    rules:
      # PostgreSQL connection pool usage
      - alert: PostgreSQLConnectionPoolHigh
        expr: |
          (
            pg_stat_activity_count{datname="doctify_development"}
            /
            pg_settings_max_connections
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection pool usage high"
          description: "Connection pool usage is {{ $value | humanizePercentage }}"

      # PostgreSQL replication lag (if using replication)
      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 10
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL replication lag detected"
          description: "Replication lag is {{ $value }} seconds"

      # PostgreSQL dead tuples (needs VACUUM)
      - alert: PostgreSQLDeadTuplesHigh
        expr: |
          (
            pg_stat_user_tables_n_dead_tup
            /
            (pg_stat_user_tables_n_live_tup + 1)
          ) > 0.1
        for: 30m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL table has high dead tuple ratio"
          description: "Table {{ $labels.relname }} has {{ $value | humanizePercentage }} dead tuples. Consider running VACUUM."

      # PostgreSQL down
      - alert: PostgreSQLDown
        expr: up{job="doctify-postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been down for more than 2 minutes"

      # Redis memory usage high
      - alert: RedisMemoryHigh
        expr: |
          (
            redis_memory_used_bytes
            /
            redis_memory_max_bytes
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis is using {{ $value | humanizePercentage }} of maximum memory"

      # Redis down
      - alert: RedisDown
        expr: up{job="doctify-redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 2 minutes"

  # ===========================================
  # System Alerts
  # ===========================================
  - name: doctify_system
    interval: 30s
    rules:
      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space is running low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.instance }}"

      # Disk space critical
      - alert: DiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.instance }}"

      # High system load
      - alert: HighSystemLoad
        expr: node_load15 / count(node_cpu_seconds_total{mode="idle"}) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "System load is high"
          description: "15-minute load average is {{ $value }} on {{ $labels.instance }}"

      # Container restarts
      - alert: ContainerRestarting
        expr: rate(container_restart_count[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container is restarting frequently"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last 15 minutes"

  # ===========================================
  # Network Alerts
  # ===========================================
  - name: doctify_network
    interval: 30s
    rules:
      # High network error rate
      - alert: HighNetworkErrorRate
        expr: |
          (
            rate(node_network_receive_errs_total[5m])
            +
            rate(node_network_transmit_errs_total[5m])
          ) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network error rate"
          description: "Network interface {{ $labels.device }} has {{ $value }} errors per second"

      # HTTP 4xx rate high
      - alert: HighHttp4xxRate
        expr: |
          (
            rate(http_requests_total{status=~"4.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.15
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High rate of 4xx errors"
          description: "4xx error rate is {{ $value | humanizePercentage }} for {{ $labels.service }}"
