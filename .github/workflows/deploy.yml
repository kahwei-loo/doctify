name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ===========================================
  # Job 1: Run Tests
  # ===========================================
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up test environment (Backend)
        if: matrix.test-type == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        if: matrix.test-type == 'backend'
        run: |
          cd backend
          pip install -r requirements/test.txt

      - name: Run backend tests
        if: matrix.test-type == 'backend'
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=test-results.xml

      - name: Upload backend coverage
        if: matrix.test-type == 'backend'
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Set up test environment (Frontend)
        if: matrix.test-type == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.test-type == 'frontend'
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        if: matrix.test-type == 'frontend'
        run: |
          cd frontend
          npm run test:unit -- --coverage

      - name: Upload frontend coverage
        if: matrix.test-type == 'frontend'
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  # ===========================================
  # Job 2: Security Scan
  # ===========================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results (Backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'backend-dependencies'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'frontend-dependencies'

  # ===========================================
  # Job 3: Build and Push Docker Images
  # ===========================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta-backend.outputs.tags }}
          format: 'sarif'
          output: 'trivy-backend-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload backend image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-image.sarif'
          category: 'backend-image'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta-frontend.outputs.tags }}
          format: 'sarif'
          output: 'trivy-frontend-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload frontend image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-image.sarif'
          category: 'frontend-image'

  # ===========================================
  # Job 4: Deploy to Staging
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.doctify.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Create deployment directory
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
        run: |
          ssh -i ~/.ssh/staging_key $SSH_USER@$SSH_HOST "mkdir -p ~/doctify-staging"

      - name: Copy deployment files
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
        run: |
          scp -i ~/.ssh/staging_key docker-compose.prod.yml $SSH_USER@$SSH_HOST:~/doctify-staging/
          scp -i ~/.ssh/staging_key -r infrastructure/ $SSH_USER@$SSH_HOST:~/doctify-staging/

      - name: Deploy to staging
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/staging_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ~/doctify-staging

            # Export environment variables
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export GITHUB_REPOSITORY=${{ github.repository }}

            # Create backup of current deployment
            docker-compose -f docker-compose.prod.yml ps -q | xargs docker inspect | \
              jq '[.[] | {name: .Name, image: .Config.Image}]' > deployment_backup_$(date +%Y%m%d_%H%M%S).json

            # Pull new images
            docker-compose -f docker-compose.prod.yml pull

            # Zero-downtime deployment with health checks
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build backend
            sleep 10

            # Health check backend
            if ! curl -f http://localhost:8000/health; then
              echo "Backend health check failed, rolling back..."
              docker-compose -f docker-compose.prod.yml up -d --no-deps backend
              exit 1
            fi

            # Deploy frontend
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build frontend
            sleep 5

            # Health check frontend
            if ! curl -f http://localhost:80/health; then
              echo "Frontend health check failed, rolling back..."
              docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
              exit 1
            fi

            # Deploy other services
            docker-compose -f docker-compose.prod.yml up -d

            # Cleanup old images
            docker image prune -f
          ENDSSH

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Verify deployment
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          # Backend health check
          curl -f $STAGING_URL/health || exit 1

          # Frontend health check
          curl -f $STAGING_URL || exit 1

          echo "✅ Staging deployment successful!"

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: 'Staging deployment successful! :rocket:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: 'Staging deployment failed! :x:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================
  # Job 5: Deploy to Production
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://doctify.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Create deployment directory
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST "mkdir -p ~/doctify"

      - name: Copy deployment files
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          scp -i ~/.ssh/production_key docker-compose.prod.yml $SSH_USER@$SSH_HOST:~/doctify/
          scp -i ~/.ssh/production_key -r infrastructure/ $SSH_USER@$SSH_HOST:~/doctify/

      - name: Create deployment backup
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ~/doctify

            # Backup current deployment state
            BACKUP_DIR=~/doctify-backups/$(date +%Y%m%d_%H%M%S)
            mkdir -p $BACKUP_DIR

            # Save container states
            docker-compose -f docker-compose.prod.yml ps -q | xargs docker inspect | \
              jq '[.[] | {name: .Name, image: .Config.Image, created: .Created}]' > $BACKUP_DIR/containers.json

            # Save volumes
            docker volume ls -q | grep doctify | xargs -I {} docker run --rm -v {}:/data -v $BACKUP_DIR:/backup alpine tar czf /backup/{}.tar.gz -C /data .

            echo "Backup created at: $BACKUP_DIR"
            echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV
          ENDSSH

      - name: Deploy to production
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ~/doctify

            # Export environment variables
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export GITHUB_REPOSITORY=${{ github.repository }}

            # Pull new images
            docker-compose -f docker-compose.prod.yml pull

            # Zero-downtime deployment
            # Deploy backend with rolling update
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale backend=2 backend
            sleep 20

            # Health check new backend instances
            if ! curl -f http://localhost:8000/health; then
              echo "Backend health check failed!"
              exit 1
            fi

            # Scale down old backend instances
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale backend=1 backend
            sleep 10

            # Deploy frontend
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
            sleep 10

            # Health check frontend
            if ! curl -f http://localhost:80/health; then
              echo "Frontend health check failed!"
              exit 1
            fi

            # Deploy other services
            docker-compose -f docker-compose.prod.yml up -d

            # Cleanup old images
            docker image prune -f

            echo "✅ Production deployment successful!"
          ENDSSH

      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Smoke tests
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Backend health
          curl -f $PRODUCTION_URL/health || exit 1

          # Frontend health
          curl -f $PRODUCTION_URL || exit 1

          # API health
          curl -f $PRODUCTION_URL/api/v1/health || exit 1

          echo "✅ Production smoke tests passed!"

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: 'Production deployment successful! :rocket: :tada:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify deployment failure and rollback
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: 'Production deployment failed! Initiating rollback... :x:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================
  # Job 6: Rollback (Manual Trigger)
  # ===========================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Rollback to previous deployment
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ~/doctify

            # Find latest backup
            BACKUP_DIR=$(ls -td ~/doctify-backups/* | head -1)
            echo "Rolling back to: $BACKUP_DIR"

            # Restore container states from backup
            if [ -f "$BACKUP_DIR/containers.json" ]; then
              # Extract previous image tags
              cat $BACKUP_DIR/containers.json | jq -r '.[] | "\(.name) \(.image)"' | while read name image; do
                docker pull $image
              done

              # Restart services with previous images
              docker-compose -f docker-compose.prod.yml down
              docker-compose -f docker-compose.prod.yml up -d

              echo "✅ Rollback completed successfully!"
            else
              echo "❌ Backup not found, manual intervention required!"
              exit 1
            fi
          ENDSSH

      - name: Verify rollback
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          sleep 30
          curl -f $PRODUCTION_URL/health || exit 1
          echo "✅ Rollback verification successful!"

      - name: Notify rollback completion
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: 'Rollback completed successfully! :back:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
