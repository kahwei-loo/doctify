name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Per-service CI is handled by frontend-ci.yml and backend-ci.yml.
# This workflow provides a single required status check for branch protection.
jobs:
  ci-pass:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: All checks delegated to service workflows
        run: echo "See Frontend CI and Backend CI workflow runs for detailed results."
