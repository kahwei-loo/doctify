name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-checks:
    name: Backend Quality Checks
    uses: ./.github/workflows/backend-ci.yml

  frontend-checks:
    name: Frontend Quality Checks
    uses: ./.github/workflows/frontend-ci.yml

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker-compose version

      - name: Start services
        run: |
          docker-compose up -d
          sleep 30

      - name: Check service health
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3003/ || exit 1

      - name: Run integration tests
        run: |
          echo "Integration tests would run here"
          # docker-compose exec -T backend pytest tests/integration/

      - name: Collect logs
        if: always()
        run: |
          docker-compose logs > docker-compose-logs.txt

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-logs
          path: docker-compose-logs.txt

      - name: Tear down services
        if: always()
        run: docker-compose down -v

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, integration-test]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.backend-checks.result }}" != "success" ]; then
            echo "Backend checks failed"
            exit 1
          fi
          if [ "${{ needs.frontend-checks.result }}" != "success" ]; then
            echo "Frontend checks failed"
            exit 1
          fi
          if [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          echo "All quality checks passed!"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All CI checks passed! Ready for review.'
            })
