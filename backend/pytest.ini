[pytest]
# Minimum pytest version
minversion = 8.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    # Show extra test summary info
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Shorter traceback format
    --tb=short
    # Strict configuration
    --strict-markers
    --strict-config
    # Coverage options
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-branch
    # Warnings - ignore third-party deprecations during testing
    # FastAPI on_event, Pydantic V1, passlib/crypt, etc.
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    # Verbose output
    -v

# Asyncio configuration
asyncio_mode = auto

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    e2e: End-to-end tests (full application flow)
    slow: Slow running tests
    db: Tests that require database
    redis: Tests that require Redis
    celery: Tests that require Celery
    external: Tests that call external APIs
    smoke: Smoke tests for critical functionality

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__init__.py
    */config.py
    */.venv/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 80.0
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if settings.DEBUG:
    @abstract
    pass

[coverage:html]
directory = htmlcov
