# ===========================================
# Doctify Docker Compose (Production)
# ===========================================
# Production environment with security hardening
#
# Security Features:
# - Traefik reverse proxy with Let's Encrypt SSL
# - Docker secrets for sensitive credentials
# - Non-root containers where possible
# - Network isolation (internal network for databases)
# - Resource limits (CPU/memory)
# - Read-only root filesystem where possible
# - Health checks for all services
#
# Deployment Model:
#   - Frontend: Vercel (not included in this compose file)
#   - Backend + infra: This compose file on cloud VPS
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Prerequisites:
#   1. Configure .env.prod file with all secrets (POSTGRES_PASSWORD, REDIS_PASSWORD, etc.)
#   2. Ensure domain DNS is configured
#   3. For Docker Swarm mode, create secrets instead of using .env.prod

# ===========================================
# Docker Secrets (optional, for Swarm mode)
# ===========================================
# For single-server deployment: use .env.prod file instead
# For Docker Swarm mode: uncomment and create secrets:
#   echo "your_password" | docker secret create postgres_password -
#   echo "your_secret" | docker secret create secret_key -
# secrets:
#   postgres_password:
#     external: true
#   secret_key:
#     external: true

services:
  # ============================================================================
  # Traefik - Reverse Proxy & SSL Termination
  # ============================================================================
  traefik:
    image: traefik:v3.3
    container_name: doctify-traefik
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_DASHBOARD_USER=${TRAEFIK_DASHBOARD_USER}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    networks:
      - doctify-public
      - doctify-internal
    labels:
      # Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@file"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================================================
  # PostgreSQL Database (with pgvector)
  # ============================================================================
  doctify-postgres:
    image: pgvector/pgvector:pg16
    container_name: doctify-postgres-prod
    restart: always
    user: "999:999"  # postgres user
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-doctify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-doctify_production}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - doctify-internal  # Internal only - not exposed to public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doctify} -d ${POSTGRES_DB:-doctify_production}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Redis Cache and Message Queue
  # ============================================================================
  doctify-redis:
    image: redis:7-alpine
    container_name: doctify-redis-prod
    restart: always
    user: "999:999"  # redis user
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - doctify-internal  # Internal only
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ============================================================================
  # Backend API Service
  # ============================================================================
  doctify-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: doctify-backend:${VERSION:-latest}
    container_name: doctify-backend-prod
    restart: always
    user: "1000:1000"  # Non-root user
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - LOG_FORMAT=json
      # PostgreSQL (individual fields read by config.py)
      - POSTGRES_HOST=doctify-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-doctify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-doctify_production}
      # Redis (config.py reads REDIS_URL, not REDIS_HOST/PORT)
      - REDIS_URL=redis://:${REDIS_PASSWORD}@doctify-redis:6379/0
      # Celery (must include Redis password)
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
      # CORS (frontend on Vercel)
      - BACKEND_CORS_ORIGINS=["https://${DOMAIN}","https://www.${DOMAIN}"]
      # AI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      # Metrics
      - SECRET_KEY=${SECRET_KEY}
      - ENABLE_PROMETHEUS=true
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_tmp:/tmp  # Required for read_only
    tmpfs:
      - /app/.cache:mode=1777,size=100M
    depends_on:
      doctify-postgres:
        condition: service_healthy
      doctify-redis:
        condition: service_healthy
    networks:
      - doctify-internal
    labels:
      - "traefik.enable=true"
      # API Router
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=security-headers@file,api-rate-limit@file,compress@file"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Health check endpoint
      - "traefik.http.routers.api-health.rule=Host(`api.${DOMAIN}`) && Path(`/health`)"
      - "traefik.http.routers.api-health.entrypoints=websecure"
      - "traefik.http.routers.api-health.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Celery Worker (Background Tasks)
  # ============================================================================
  doctify-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: doctify-backend:${VERSION:-latest}
    container_name: doctify-celery-prod
    restart: always
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: celery -A app.tasks.celery_app worker -l warning --pool=prefork --concurrency=2 -Q ocr_queue,default
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - LOG_FORMAT=json
      # PostgreSQL
      - POSTGRES_HOST=doctify-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-doctify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-doctify_production}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@doctify-redis:6379/0
      # Celery (must include Redis password)
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
      # AI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_tmp:/tmp
    tmpfs:
      - /app/.cache:mode=1777,size=100M
    depends_on:
      - doctify-postgres
      - doctify-redis
      - doctify-backend
    networks:
      - doctify-internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Celery Beat (Task Scheduler)
  # ============================================================================
  doctify-celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: doctify-backend:${VERSION:-latest}
    container_name: doctify-celery-beat-prod
    restart: always
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: celery -A app.tasks.celery_app beat -l warning --scheduler celery.beat:PersistentScheduler
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      # Celery (must include Redis password)
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@doctify-redis:6379/1
    volumes:
      - celery_beat_data:/app/celerybeat-schedule
    tmpfs:
      - /tmp:mode=1777,size=10M
    depends_on:
      - doctify-redis
    networks:
      - doctify-internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Prometheus (Metrics Collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: doctify-prometheus-prod
    restart: always
    user: "65534:65534"  # nobody user
    security_opt:
      - no-new-privileges:true
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/docker/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - doctify-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prometheus.middlewares=admin-whitelist@file,dashboard-auth@file"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ============================================================================
  # Grafana (Monitoring Dashboard)
  # ============================================================================
  grafana:
    image: grafana/grafana:11.5.2
    container_name: doctify-grafana-prod
    restart: always
    user: "472:472"  # grafana user
    security_opt:
      - no-new-privileges:true
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - doctify-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ============================================================================
  # AlertManager (Notifications)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: doctify-alertmanager-prod
    restart: always
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://alertmanager.${DOMAIN}'
    volumes:
      - ./infrastructure/docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - doctify-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${DOMAIN}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls.certresolver=letsencrypt"
      - "traefik.http.routers.alertmanager.middlewares=admin-whitelist@file,dashboard-auth@file"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================================
# Volumes for Data Persistence
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  backend_tmp:
    driver: local
  celery_beat_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  traefik_letsencrypt:
    driver: local
  traefik_logs:
    driver: local

# ===========================================
# Network Configuration
# ===========================================
networks:
  # Public network - for Traefik and services that need internet access
  doctify-public:
    driver: bridge
    name: doctify-public

  # Internal network - for database and internal services
  # Services on this network cannot be reached from outside
  doctify-internal:
    driver: bridge
    name: doctify-internal
    internal: true  # No external connectivity
